name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgirepository1.0-dev \
          libgtk-4-dev \
          libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev \
          gstreamer1.0-plugins-good \
          gir1.2-gtk-4.0 \
          gir1.2-gst-plugins-base-1.0 \
          libgpgme-dev \
          gpg \
          xvfb \
          libcairo2-dev \
          pkg-config \
          python3-gi \
          python3-gi-cairo \
          python3-gpg \
          python3-venv

    - name: Set up Virtual Environment with System Packages
      run: |
        python3 -m venv --system-site-packages venv
        echo "PATH=$GITHUB_WORKSPACE/venv/bin:$PATH" >> $GITHUB_ENV

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install babel BabelGladeExtractor
        pip install .[test]

    - name: Compile translation catalogs
      run: |
        python setup.py compile_catalog

    - name: Run test suite
      run: |
        xvfb-run pytest

    - name: Build sdist and egg
      run: |
        python setup.py sdist bdist_egg

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: gnome-keysign-release-packages
        path: dist/
