# Babel configuration

[compile_catalog]
domain = keysign
directory = keysign/locale
statistics = true

[extract_messages]
# Note: Do not run `pybabel extract -F setup.cfg`. Use `babel.cfg` instead, 
# or use `python setup.py extract_messages`.
mapping_file = babel.cfg
add_comments = TRANSLATORS:
copyright_holder = Tobias Mueller
msgid-bugs-address = tobiasmue@gnome.org
output_file = keysign/locale/keysign.pot
width = 80

[init_catalog]
# Call, e.g. setup.py init_catalog --locale=de
domain = keysign
input_file = keysign/locale/keysign.pot
output_dir = keysign/locale

[update_catalog]
domain = keysign
input_file = keysign/locale/keysign.pot
output_dir = keysign/locale
previous = true

[tool:pytest]
pythonpath = .
